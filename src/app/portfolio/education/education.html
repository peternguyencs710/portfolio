<!-- Education-->
<section class="resume-section" id="education">
    <div class="resume-section-content">
        <h2 class="mb-5">{{ 'education.title' | translate }}</h2>
        <div class="d-flex flex-column flex-md-row justify-content-between mb-5">
            <div class="flex-grow-1">
                <h3 class="mb-0">{{ 'education.school' | translate }}</h3>
                <div class="subheading mb-3">{{ 'education.degree' | translate }}</div>
                <div>{{ 'education.major' | translate }}</div>
                <div >
                    <img class="img-fluid" src="assets/img/carleton-logo.svg" alt="Carleton University of Ottawa">
                </div>
            </div>
            
            <div style="padding-top:30px" class="flex-shrink-0"><span class="text-primary">{{ 'education.dates' | translate }}</span></div>
            
        </div>
    </div>
</section>
