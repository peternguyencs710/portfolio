<section class="resume-section"  id="ngrxstore">
  <div class="resume-section-content">
    <h2 class="mb-5">NgRX Signal Store Tutorial</h2>

    <mat-form-field class="todo-input">
      <mat-label>New Todo</mat-label>
      <input matInput #intput placeholder="Enter a new todo"
        (keyup.enter)="onAddTodo(intput.value); intput.value=''" />
      <mat-icon matSuffix>edit</mat-icon>
      
    </mat-form-field>

    <mat-button-toggle-group #filter (change)="onFilterTodo($event)">
      <mat-button-toggle value="all">All</mat-button-toggle>
      <mat-button-toggle value="pending">Pending</mat-button-toggle>
      <mat-button-toggle value="completed">Completed</mat-button-toggle>
    </mat-button-toggle-group>

    <mat-selection-list>
        @for(todo of store.filteredTodos(); track todo.id; let index = $index) {
          <mat-list-option [selected]="todo.completed" (click)="onToggleTodo(todo.id, todo.completed)">
            <div class="todo-item">
              <mat-icon class="delete-todo"
                (click)="onDeleteTodo(todo.id, $event)">delete</mat-icon>
              <span [ngStyle]="{ 'text-decoration': todo.completed ? 'line-through' : 'none' }">{{ todo.title }}</span>
            </div>
          </mat-list-option>
        }
    </mat-selection-list>
  </div>
</section>
