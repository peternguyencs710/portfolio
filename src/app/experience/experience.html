<!-- Experience-->
<section class="resume-section" id="experience">
    <div class="resume-section-content">
        <h2 class="mb-5">{{"experience.title" | translate}}</h2>

            <div *ngFor="let position of experience" class="d-flex flex-column flex-md-row justify-content-between mb-5">
                <div class="flex-grow-1">
                    <h3 class="mb-0">{{ position.title }} </h3>
                    <div class="subheading mb-3">{{ position.company }}</div>
                    <ul *ngFor="let description of position.description">
                        <li>{{ description }}</li >
                    </ul>
                    <div style="padding-left:30px" class="d-inline justify-content-center" *ngFor="let image of position.images">
                        <img class="align-top img-fluid work-img" [src]="image" (click)="openImageModal(image)" alt="Thumbnail">
                    </div>
                </div>
                <div class="flex-shrink-0"><span class="text-primary">{{ position.dates }}</span></div>
            </div>
